name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend — typecheck + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finder_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finder_test
      JWT_SECRET: ci-test-secret-not-for-production
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  frontend:
    name: Frontend — typecheck + lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  deploy-frontend:
    name: Deploy frontend → Vercel
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: |
          npx vercel --prod --yes --token "$VERCEL_TOKEN" ${VERCEL_SCOPE:+--scope "$VERCEL_SCOPE"}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}

  smoke-test:
    name: Post-deploy smoke test
    needs: [deploy-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Wait for Vercel propagation
        run: sleep 15
      - name: Health check — backend liveness
        run: |
          curl -f --retry 3 --retry-delay 5 \
            https://finder-pos-backend.vercel.app/healthz \
            || (echo "❌ /healthz failed" && exit 1)
      - name: Health check — backend readiness
        run: |
          curl -f --retry 3 --retry-delay 5 \
            https://finder-pos-backend.vercel.app/readyz \
            || (echo "❌ /readyz failed" && exit 1)
      - name: Health check — feature flags endpoint
        run: |
          curl -f --retry 2 --retry-delay 5 \
            https://finder-pos-backend.vercel.app/api/v1/flags \
            || (echo "❌ /api/v1/flags failed" && exit 1)
      - name: Health check — frontend
        run: |
          curl -f --retry 3 --retry-delay 5 \
            https://finder-pos-frontend.vercel.app/ \
            || (echo "❌ frontend failed" && exit 1)
