version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finder
      POSTGRES_PASSWORD: finder
      POSTGRES_DB: finder_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://finder:finder@postgres:5432/finder_dev
      JWT_SECRET: dev-secret-change-in-production
      NODE_ENV: development
      PORT: 3001
    depends_on:
      - postgres

  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:3001
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  pgdata:
