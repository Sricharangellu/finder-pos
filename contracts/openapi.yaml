openapi: 3.0.3
info:
  title: Ascend API
  version: 2.0.0
  description: |
    Ascend modular-monolith REST API. All business endpoints require
    Bearer authentication (JWT issued by POST /api/identity/login).

    ## Authentication
    Short-lived access tokens (15 min) are issued at login. A refresh token
    (7 days) allows silent renewal via POST /api/identity/refresh. Tokens are
    also set as httpOnly cookies for browser clients.

    ## Multi-tenancy
    Every JWT carries a `tenantId` claim. The backend enforces tenant isolation
    via application-layer filtering and Row-Level Security. Never pass
    `tenantId` as a request parameter.

    ## Money
    All money values are **integer cents** (e.g. $10.99 → 1099).

    ## Timestamps
    All timestamps are **Unix epoch milliseconds** (integer).

    ## IDs
    UUID v7 strings with a resource-type prefix (ord_, prod_, cust_, etc.).

    ## Error envelope
    All errors:
    ```json
    { "error": { "code": "string", "message": "string", "requestId": "string" } }
    ```

    ## Pagination
    List endpoints use cursor-based pagination unless noted.
    Pass `cursor` from `nextCursor` in the previous response.

servers:
  - url: /
    description: Ascend backend

# ── Security ──────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Shared ─────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string, example: unauthenticated }
            message: { type: string }
            requestId: { type: string }

    PaginatedResponse:
      type: object
      properties:
        items: { type: array, items: {} }
        nextCursor: { type: string, nullable: true }
        total: { type: integer }

    # ── Identity ───────────────────────────────────────────────────────────────
    TokenPair:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, example: 900 }

    Role:
      type: string
      enum: [owner, manager, cashier]

    MeResponse:
      type: object
      properties:
        userId: { type: string, example: usr_01jz123abc }
        tenantId: { type: string, example: tnt_demo }
        role: { $ref: "#/components/schemas/Role" }

    # ── Catalog ────────────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id: { type: string }
        sku: { type: string }
        name: { type: string }
        price_cents: { type: integer }
        cost_cents: { type: integer }
        tax_class: { type: string, enum: [standard, exempt] }
        status: { type: string, enum: [active, draft, archived] }
        barcode: { type: string }
        category_ids: { type: array, items: { type: string } }
        reorder_point: { type: integer }
        created_at: { type: integer }

    # ── Orders ─────────────────────────────────────────────────────────────────
    OrderLine:
      type: object
      properties:
        productId: { type: string }
        qty: { type: integer }
        unit_price_cents: { type: integer }
        line_total_cents: { type: integer }
        discountCents: { type: integer }

    Order:
      type: object
      properties:
        id: { type: string }
        status: { type: string, enum: [open, completed, refunded, voided] }
        totalCents: { type: integer }
        discountCents: { type: integer }
        customerId: { type: string }
        stateCode: { type: string }
        lines: { type: array, items: { $ref: "#/components/schemas/OrderLine" } }
        created_at: { type: integer }

    # ── Customers ──────────────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        loyalty_points: { type: integer }
        store_credit_cents: { type: integer }
        tier: { type: string }
        created_at: { type: integer }

    # ── Inventory ──────────────────────────────────────────────────────────────
    InventoryLevel:
      type: object
      properties:
        product_id: { type: string }
        on_hand: { type: integer }
        reorder_point: { type: integer }
        on_order: { type: integer }

    # ── Payments ───────────────────────────────────────────────────────────────
    Payment:
      type: object
      properties:
        id: { type: string }
        orderId: { type: string }
        method: { type: string, enum: [cash, card, store_credit, split, gift_card, ebt] }
        amountCents: { type: integer }
        status: { type: string, enum: [captured, declined, refunded] }
        created_at: { type: integer }

    # ── Vertical schemas ───────────────────────────────────────────────────────
    Vehicle:
      type: object
      properties:
        id: { type: string }
        vin: { type: string }
        plate: { type: string }
        make: { type: string }
        model: { type: string }
        year: { type: integer }
        color: { type: string }
        mileage: { type: integer }
        customer_id: { type: string }

    WorkOrder:
      type: object
      properties:
        id: { type: string }
        vehicle_id: { type: string }
        description: { type: string }
        status: { type: string, enum: [open, in_progress, completed, invoiced] }
        labour_cents: { type: integer }
        parts_cents: { type: integer }
        total_cents: { type: integer }
        started_at: { type: integer, nullable: true }
        completed_at: { type: integer, nullable: true }

    Room:
      type: object
      properties:
        id: { type: string }
        room_number: { type: string }
        room_type: { type: string }
        rate_cents: { type: integer }
        status: { type: string, enum: [available, occupied, checkout, cleaning, maintenance] }
        guest_name: { type: string, nullable: true }
        checked_in_at: { type: integer, nullable: true }

    RoomCharge:
      type: object
      properties:
        id: { type: string }
        room_id: { type: string }
        description: { type: string }
        amount_cents: { type: integer }
        category: { type: string }
        posted_at: { type: integer }
        settled_at: { type: integer, nullable: true }

    Appointment:
      type: object
      properties:
        id: { type: string }
        customer_id: { type: string, nullable: true }
        service: { type: string }
        employee_id: { type: string, nullable: true }
        starts_at: { type: integer }
        ends_at: { type: integer }
        status: { type: string, enum: [scheduled, confirmed, in_progress, completed, cancelled, no_show] }
        notes: { type: string, nullable: true }

    Patient:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        dob: { type: string, format: date }
        allergies: { type: array, items: { type: string } }
        phone: { type: string }
        email: { type: string }

    Prescription:
      type: object
      properties:
        id: { type: string }
        patient_id: { type: string }
        drug_name: { type: string }
        strength: { type: string }
        prescriber: { type: string }
        refills_authorized: { type: integer }
        refills_remaining: { type: integer }
        instructions: { type: string }
        written_at: { type: integer }
        expires_at: { type: integer }

    ProductionOrder:
      type: object
      properties:
        id: { type: string }
        product_id: { type: string }
        quantity: { type: integer }
        status: { type: string, enum: [draft, in_progress, completed] }
        created_at: { type: integer }

    BomLine:
      type: object
      properties:
        id: { type: string }
        production_order_id: { type: string }
        material_id: { type: string }
        qty_required: { type: number }
        qty_consumed: { type: number }

    RentalAsset:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        category: { type: string }
        daily_rate_cents: { type: integer }
        status: { type: string, enum: [available, rented, maintenance, retired] }
        serial_number: { type: string }

    RentalContract:
      type: object
      properties:
        id: { type: string }
        asset_id: { type: string }
        asset_name: { type: string }
        customer_id: { type: string, nullable: true }
        customer_name: { type: string }
        starts_at: { type: integer }
        ends_at: { type: integer }
        total_cents: { type: integer }
        status: { type: string, enum: [active, returned, cancelled] }

    Event:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        starts_at: { type: integer }
        ticket_price_cents: { type: integer }
        capacity: { type: integer }
        sold: { type: integer }
        status: { type: string, enum: [draft, on_sale, sold_out, completed, cancelled] }

    Ticket:
      type: object
      properties:
        id: { type: string }
        event_id: { type: string }
        customer_name: { type: string, nullable: true }
        qr_code: { type: string }
        redeemed_at: { type: integer, nullable: true }
        issued_at: { type: integer }

    Student:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        status: { type: string, enum: [active, inactive, graduated, withdrawn] }
        outstanding: { type: integer, description: Sum of unpaid fees in cents }

    StudentFee:
      type: object
      properties:
        id: { type: string }
        student_id: { type: string }
        fee_type: { type: string, enum: [tuition, registration, material, exam, late_fee] }
        amount_cents: { type: integer }
        due_date: { type: integer }
        paid_at: { type: integer, nullable: true }
        description: { type: string }

  responses:
    Unauthorized:
      description: Authentication required or token expired.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Insufficient role.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Conflict:
      description: Business rule violation.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

security:
  - bearerAuth: []

# ═══════════════════════════════════════════════════════════════════════════════
paths:

  # ── Platform ────────────────────────────────────────────────────────────────
  /healthz:
    get:
      summary: Liveness probe
      operationId: healthz
      security: []
      tags: [Platform]
      responses:
        "200": { description: Process alive }

  /readyz:
    get:
      summary: Readiness probe
      operationId: readyz
      security: []
      tags: [Platform]
      responses:
        "200": { description: Service ready }
        "503": { description: DB unavailable }

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: metrics
      tags: [Platform]
      description: Bearer token required (not a JWT — see METRICS_TOKEN env var).
      responses:
        "200": { description: Prometheus text format }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/flags:
    get:
      summary: Feature flags for tenant
      operationId: getFlags
      tags: [Platform]
      responses:
        "200":
          description: Flag map
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/stream:
    get:
      summary: Server-sent events stream
      operationId: sseStream
      tags: [Platform]
      description: Returns `text/event-stream`. Events mirror webhook payloads.
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/jobs:
    get:
      summary: Background job queue status
      operationId: getJobs
      tags: [Platform]
      description: Owner only.
      responses:
        "200": { description: Job queue snapshot }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ── Identity ────────────────────────────────────────────────────────────────
  /api/identity/register:
    post:
      summary: Register new account
      operationId: register
      security: []
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [storeName, email, password]
              properties:
                storeName: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/identity/login:
    post:
      summary: Authenticate and issue tokens
      operationId: login
      security: []
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/identity/refresh:
    post:
      summary: Refresh access token
      operationId: refreshToken
      security: []
      tags: [Identity]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/identity/logout:
    post:
      summary: Logout and revoke refresh token
      operationId: logout
      tags: [Identity]
      responses:
        "204": { description: Logged out }

  /api/identity/me:
    get:
      summary: Current user identity
      operationId: getMe
      tags: [Identity]
      responses:
        "200":
          description: Caller identity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/identity/forgot-password:
    post:
      summary: Request password reset email
      operationId: forgotPassword
      security: []
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "204": { description: Email sent if account exists }

  /api/identity/reset-password:
    post:
      summary: Reset password with token
      operationId: resetPassword
      security: []
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        "204": { description: Password reset }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/identity/api-keys:
    get:
      summary: List API keys
      operationId: listApiKeys
      tags: [Identity]
      description: Owner only.
      responses:
        "200": { description: API key list }
    post:
      summary: Create API key
      operationId: createApiKey
      tags: [Identity]
      description: Owner only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                scopes: { type: array, items: { type: string } }
                expiresAt: { type: integer }
      responses:
        "201": { description: API key created (value shown once) }

  /api/identity/api-keys/{id}:
    delete:
      summary: Revoke API key
      operationId: revokeApiKey
      tags: [Identity]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Key revoked }

  /api/identity/mfa/setup:
    post:
      summary: Setup MFA — returns TOTP QR code
      operationId: mfaSetup
      tags: [Identity]
      responses:
        "200": { description: TOTP secret and QR code }

  /api/identity/mfa/verify:
    post:
      summary: Verify and enable MFA
      operationId: mfaVerify
      tags: [Identity]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        "204": { description: MFA enabled }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/identity/mfa/disable:
    post:
      summary: Disable MFA
      operationId: mfaDisable
      tags: [Identity]
      responses:
        "204": { description: MFA disabled }

  # ── Catalog ─────────────────────────────────────────────────────────────────
  /api/v1/catalog:
    get:
      summary: List products
      operationId: listProducts
      tags: [Catalog]
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [active, draft, archived] }
        - name: q
          in: query
          schema: { type: string }
        - name: excludeMasters
          in: query
          schema: { type: boolean }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Product" }
    post:
      summary: Create product
      operationId: createProduct
      tags: [Catalog]
      description: Manager or above.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sku, name, price_cents]
              properties:
                sku: { type: string }
                name: { type: string }
                price_cents: { type: integer }
                cost_cents: { type: integer }
                tax_class: { type: string, enum: [standard, exempt] }
                barcode: { type: string }
                reorder_point: { type: integer }
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/catalog/{id}:
    get:
      summary: Get product
      operationId: getProduct
      tags: [Catalog]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      summary: Update product
      operationId: updateProduct
      tags: [Catalog]
      description: Manager or above.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
    delete:
      summary: Archive product
      operationId: archiveProduct
      tags: [Catalog]
      description: Manager or above. Blocks if product is on any order.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Archived }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/catalog/barcode/{code}:
    get:
      summary: Lookup product by barcode
      operationId: getProductByBarcode
      tags: [Catalog]
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/catalog/import-csv:
    post:
      summary: Import products from CSV
      operationId: importProductsCsv
      tags: [Catalog]
      description: Manager or above.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [csv]
              properties:
                csv: { type: string, description: CSV string with header row }
      responses:
        "200": { description: Import result with row counts and errors }

  /api/v1/catalog/export:
    get:
      summary: Export catalog as CSV
      operationId: exportCatalog
      tags: [Catalog]
      responses:
        "200":
          description: CSV download
          content:
            text/csv:
              schema: { type: string }

  /api/v1/catalog/{id}/compliance:
    patch:
      summary: Update product compliance fields
      operationId: updateCompliance
      tags: [Catalog]
      description: Manager or above.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tobacco_type: { type: string, enum: [cigarettes, cigars, smokeless, vape, other] }
                flavored: { type: boolean }
                menthol: { type: boolean }
                msa_reportable: { type: boolean }
                restricted_states: { type: array, items: { type: string } }
      responses:
        "200": { description: Updated }

  # ── Inventory ───────────────────────────────────────────────────────────────
  /api/v1/inventory:
    get:
      summary: List inventory levels
      operationId: listInventory
      tags: [Inventory]
      parameters:
        - name: lowStock
          in: query
          schema: { type: boolean }
        - name: q
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Inventory levels
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/InventoryLevel" }

  /api/v1/inventory/{productId}/receive:
    post:
      summary: Receive inventory
      operationId: receiveInventory
      tags: [Inventory]
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity: { type: integer }
                expiryDate: { type: string, format: date }
                lotCode: { type: string }
                unitCostCents: { type: integer }
      responses:
        "200": { description: Received }

  /api/v1/inventory/{productId}/adjust:
    post:
      summary: Adjust inventory quantity
      operationId: adjustInventory
      tags: [Inventory]
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [delta]
              properties:
                delta: { type: integer, description: Positive = add, negative = remove }
                reason: { type: string, enum: [receiving, adjustment, damage, theft, write-off] }
      responses:
        "200": { description: Adjusted }

  /api/v1/inventory/expiring:
    get:
      summary: Products expiring soon
      operationId: getExpiring
      tags: [Inventory]
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 30 }
      responses:
        "200": { description: Expiring product batches }

