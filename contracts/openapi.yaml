          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountCents]
              properties:
                amountCents: { type: integer }
                method: { type: string }
      responses:
        "200": { description: Payment recorded }

  /api/v1/billing/bills:
    get:
      summary: List bills (AP)
      operationId: listBills
      tags: [Billing]
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200": { description: Bills }
    post:
      summary: Create bill
      operationId: createBill
      tags: [Billing]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                supplierId: { type: string }
                totalCents: { type: integer }
                dueDate: { type: integer }
                discountPct: { type: number }
                discountDate: { type: integer }
      responses:
        "201": { description: Bill created }

  /api/v1/billing/bills/{id}/pay:
    post:
      summary: Pay bill
      operationId: payBill
      tags: [Billing]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountCents]
              properties:
                amountCents: { type: integer }
                method: { type: string }
      responses:
        "200": { description: Payment recorded; early discount applied if eligible }

  # ── Audit Log ───────────────────────────────────────────────────────────────
  /api/v1/audit_log:
    get:
      summary: List audit log entries
      operationId: listAuditLog
      tags: [Audit]
      parameters:
        - name: actor
          in: query
          schema: { type: string }
        - name: resource_type
          in: query
          schema: { type: string }
        - name: action
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer }
      responses:
        "200": { description: Audit log entries }

  # ── SSO ─────────────────────────────────────────────────────────────────────
  /api/v1/sso/config:
    get:
      summary: Get SSO configuration
      operationId: getSsoConfig
      tags: [SSO]
      description: Owner only.
      responses:
        "200": { description: OIDC/SAML config }
    put:
      summary: Upsert SSO configuration
      operationId: setSsoConfig
      tags: [SSO]
      description: Owner only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled, clientId, clientSecret, discoveryUrl]
              properties:
                enabled: { type: boolean }
                providerName: { type: string }
                clientId: { type: string }
                clientSecret: { type: string }
                discoveryUrl: { type: string }
                defaultRole: { $ref: "#/components/schemas/Role" }
      responses:
        "200": { description: SSO config saved }
    delete:
      summary: Delete SSO configuration
      operationId: deleteSsoConfig
      tags: [SSO]
      description: Owner only.
      responses:
        "204": { description: SSO config deleted }

  /api/v1/sso/initiate:
    post:
      summary: Initiate OIDC login
      operationId: ssoInitiate
      security: []
      tags: [SSO]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, redirectUri]
              properties:
                tenantId: { type: string }
                redirectUri: { type: string }
      responses:
        "200": { description: OIDC authorization URL }

  /api/v1/sso/callback:
    post:
      summary: Handle OIDC callback
      operationId: ssoCallback
      security: []
      tags: [SSO]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state, code, redirectUri]
              properties:
                state: { type: string }
                code: { type: string }
                redirectUri: { type: string }
      responses:
        "200":
          description: Token pair for the authenticated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
